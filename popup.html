<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                width: 240px;
                padding: 16px;
                font-family: sans-serif;
            }
            h2 {
                margin: 0 0 12px 0;
                font-size: 16px;
            }
            button {
                width: 100%;
                padding: 10px;
                margin-bottom: 8px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
            }

            #explain-btn {
                background: #000;
                color: #fff;
            }
            #new-topic-btn {
                background: #f0f0f0;
                color: #000;
            }
            textarea {
                width: 100%;
                margin-top: 4px;
                padding: 8px;
                font-size: 12px;
                border-radius: 6px;
                border: 1px solid #ddd;
                resize: none;
                box-sizing: border-box;
            }
            label {
                font-size: 12px;
                color: #666;
            }
        </style>

    </head>
    <body>
        <h2>Distill.</h2>
        <button id="explain-btn">Explain This</button>
        <button id="new-topic-btn">New Topic</button>
        <label>Custom Prompt</label>
        <textarea id="custom-prompt" rows="3" placeholder="Explain this simply like I'm a student..."></textarea>
        <script src="popup.js"></script>
    </body>
</html>
